spring.application.name=SpringRag

# Disable Spring AI auto-config (we use a custom HTTP client instead)
spring.ai.mistralai.chat.enabled=false
spring.ai.ollama.chat.enabled=false
# Mistral configuration (set your key via env var or here; env varrecommended)
# You can set MISTRAL_API_KEY environment variable and Spring will map it to 'mistral.api.key' using relaxed binding

mistral.api.key=${MISTRAL_KEY}
# Default models (override if needed)
mistral.chat.model=mistral-small-latest
mistral.embedding.model=mistral-embed
spring.datasource.url=jdbc:h2:file:./data/model_mapper_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

